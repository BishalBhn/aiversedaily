<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" width="560" height="150" role="img" aria-label="AIverse Daily">
  <defs>
    <radialGradient id="planet2" cx="42%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="16%" stop-color="#c8c0ff"/>
      <stop offset="42%" stop-color="#8b7dff"/><stop offset="74%" stop-color="#5a4bd2"/>
      <stop offset="100%" stop-color="#160f3a"/>
    </radialGradient>
    <linearGradient id="ring2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#31d9cb"/><stop offset="100%" stop-color="#8b7dff"/>
    </linearGradient>
    <linearGradient id="ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7dff"/><stop offset="100%" stop-color="#31d9cb"/>
    </linearGradient>
    <radialGradient id="spark2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4cf"/><stop offset="45%" stop-color="#ffd86d"/><stop offset="100%" stop-color="#ffb43d"/>
    </radialGradient>
    <filter id="g2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4.5"/></filter>
    <clipPath id="fh2"><rect x="0" y="62" width="120" height="58"/></clipPath>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Inter:wght@600&amp;display=swap');</style>
  </defs>

  <!-- icon -->
  <g transform="translate(6,15) scale(0.92)">
    <g transform="rotate(-22 60 62)">
      <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring2)" stroke-width="3.2" opacity="0.35" filter="url(#g2)"/>
      <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring2)" stroke-width="3"/>
    </g>
    <circle cx="60" cy="62" r="29" fill="#8b7dff" opacity="0.28" filter="url(#g2)"/>
    <circle cx="60" cy="62" r="23" fill="url(#planet2)"/>
    <g transform="rotate(-22 60 62)" clip-path="url(#fh2)">
      <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring2)" stroke-width="3"/>
    </g>
    <circle cx="83.1" cy="38.7" r="8.5" fill="#ffd86d" opacity="0.5" filter="url(#g2)"/>
    <circle cx="83.1" cy="38.7" r="4.4" fill="url(#spark2)"/>
    <circle cx="82.2" cy="37.6" r="1.5" fill="#fffaf0"/>
  </g>

  <!-- wordmark -->
  <text x="138" y="80" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="56" letter-spacing="-0.5">
    <tspan fill="url(#ai)">AI</tspan><tspan fill="#eaf0ff">verse</tspan>
  </text>

  <!-- masthead 'DAILY' rule -->
  <line x1="140" y1="104" x2="300" y2="104" stroke="#31d9cb" stroke-width="1" opacity="0.55"/>
  <circle cx="305" cy="104" r="1.6" fill="#31d9cb"/>
  <text x="316" y="109" font-family="'Inter', sans-serif" font-weight="600" font-size="15" letter-spacing="9" fill="#aab4d4">DAILY</text>
  <circle cx="404" cy="104" r="1.6" fill="#31d9cb"/>
  <line x1="411" y1="104" x2="540" y2="104" stroke="#31d9cb" stroke-width="1" opacity="0.55"/>
</svg>
