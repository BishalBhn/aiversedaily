<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="AIverse Daily icon">
  <defs>
    <radialGradient id="planet" cx="42%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="16%" stop-color="#c8c0ff"/>
      <stop offset="42%" stop-color="#8b7dff"/>
      <stop offset="74%" stop-color="#5a4bd2"/>
      <stop offset="100%" stop-color="#160f3a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#31d9cb"/>
      <stop offset="100%" stop-color="#8b7dff"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4cf"/>
      <stop offset="45%" stop-color="#ffd86d"/>
      <stop offset="100%" stop-color="#ffb43d"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="frontHalf"><rect x="0" y="62" width="120" height="58"/></clipPath>
  </defs>

  <!-- orbit (full, behind planet) -->
  <g transform="rotate(-22 60 62)">
    <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring)" stroke-width="3.2" opacity="0.35" filter="url(#softglow)"/>
    <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring)" stroke-width="3"/>
  </g>

  <!-- planet aura -->
  <circle cx="60" cy="62" r="29" fill="#8b7dff" opacity="0.28" filter="url(#softglow)"/>
  <!-- planet -->
  <circle cx="60" cy="62" r="23" fill="url(#planet)"/>

  <!-- orbit front (lower arc over planet) -->
  <g transform="rotate(-22 60 62)" clip-path="url(#frontHalf)">
    <ellipse cx="60" cy="62" rx="49" ry="16.5" fill="none" stroke="url(#ring)" stroke-width="3"/>
  </g>

  <!-- daily spark -->
  <circle cx="83.1" cy="38.7" r="8.5" fill="#ffd86d" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="83.1" cy="38.7" r="4.4" fill="url(#spark)" filter="url(#glow)"/>
  <circle cx="82.2" cy="37.6" r="1.5" fill="#fffaf0"/>
</svg>
