<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lost in space — AIverse Daily</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="assets/aiverse-icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
    font-family:"Inter",system-ui,sans-serif;color:#eaf0ff;
    background:radial-gradient(800px 500px at 70% 10%,rgba(139,125,255,.18),transparent 60%),
      radial-gradient(600px 400px at 10% 90%,rgba(49,217,203,.12),transparent 60%),
      linear-gradient(180deg,#060914,#0a1020)}
  .wrap{max-width:520px}
  img{width:120px;height:120px;filter:drop-shadow(0 0 22px rgba(139,125,255,.5));margin-bottom:22px}
  h1{font-family:"Playfair Display",serif;font-size:clamp(2.6rem,9vw,4rem);line-height:1;
    background:linear-gradient(120deg,#8b7dff,#31d9cb);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:#aab4d4;margin:14px 0 26px;font-size:1.05rem;line-height:1.6}
  a{display:inline-block;text-decoration:none;font-weight:600;color:#08101f;
    background:linear-gradient(120deg,#8b7dff,#31d9cb);padding:12px 24px;border-radius:999px;
    box-shadow:0 0 28px -10px rgba(139,125,255,.7);transition:transform .2s}
  a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="wrap">
    <img src="assets/aiverse-icon.svg" alt="AIverse Daily" />
    <h1>404</h1>
    <p>This page drifted off into the void. Let’s get you back to today’s AI, made clear.</p>
    <a href="/">Back to AIverse Daily</a>
  </div>
</body>
</html>
